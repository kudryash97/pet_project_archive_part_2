# Zookeeper Configuration
# Optimized for development environment with ClickHouse cluster

# Basic Settings
dataDir=/data
dataLogDir=/datalog
clientPort=2181

# Tick time in milliseconds (basic unit for heartbeats)
tickTime=2000

# Initial synchronization timeout
initLimit=5

# Sync timeout between leader and followers
syncLimit=2

# Maximum number of client connections
maxClientCnxns=60

# Enable standalone mode
standaloneEnabled=true
admin.enableServer=true

# Auto Purge Configuration (CRITICAL FOR PERFORMANCE)
# Retain last 3 snapshots (reduces disk usage while maintaining safety)
autopurge.snapRetainCount=3

# Run purge every 1 hour (in hours)
# This prevents transaction log buildup which causes I/O issues
autopurge.purgeInterval=1

# Performance Tuning
# Pre-allocate disk space for transaction logs (reduces fragmentation)
preAllocSize=65536

# Snapshot count before log roll (reduce for lower I/O)
snapCount=100000

# Force sync for durability - keep enabled but reduce frequency via snapCount
forceSync=yes

# Sync request processor timeout (ms) - increase for slow disks
syncRequestProcessorMaxReadBatchSize=1000
syncRequestProcessorMaxCommitBatchSize=100

# Max session timeout (ms) - increase to handle slow I/O
maxSessionTimeout=40000

# Min session timeout (ms)
minSessionTimeout=4000

# Server configuration (standalone)
server.1=localhost:2888:3888;2181

# Logging
# Reduce log verbosity to minimize disk writes
# Configure in log4j.properties if needed

# JMX Configuration
# Already configured via container environment
