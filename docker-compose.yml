x-airflow-common:
  &airflow-common
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  networks:
    - airflow
  environment:
    &airflow-common-env
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__CELERY__BROKER_URL: redis://:@af_redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${_AIRFLOW_WWW_USER_PASSWORD}@af_postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__TEST_CONNECTION: Enabled
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${_AIRFLOW_WWW_USER_PASSWORD}@af_postgres/airflow
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 5
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 5
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    DOCKER_HOST: unix:///var/run/docker.sock
  volumes:
    - ./workspace/dags:/opt/airflow/dags:rw
    - ./workspace/dbt:/opt/airflow/dbt
    - ./workspace/logs:/opt/airflow/logs
    - ./workspace/shared_workers_data:/opt/airflow/shared_workers_data
    - ./docker/airflow/plugins:/opt/airflow/plugins:rw
    - /var/run/docker.sock:/var/run/docker.sock:rw
  user: "${AIRFLOW_UID:-50000}:0"
  group_add:
    - "999"
  depends_on:
    &airflow-common-depends-on
      af_redis:
        condition: service_healthy
      af_postgres:
        condition: service_healthy

x-clickhouse-common:
  &clickhouse-common
  image: clickhouse/clickhouse-server:25.5-alpine
  networks:
    - airflow
  environment:
    CLICKHOUSE_USER: clickhouse
    CLICKHOUSE_PASSWORD: clickhouse
  depends_on:
    - zookeeper
  mem_reservation: "256M"
  mem_limit: "3G"
  cpus: "2"
  healthcheck:
    test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 10s
  # I/O limits for ClickHouse nodes (4 nodes share ~80MB/s write, 120MB/s read)
  blkio_config:
    weight: 700
    device_write_bps:
      - path: /dev/vda
        rate: 20mb
    device_read_bps:
      - path: /dev/vda
        rate: 30mb

x-spark-worker-common-env:
  &spark-worker-common-env
  SPARK_PUBLIC_DNS: "spark.rzvde.pro"
  SPARK_MASTER_URL: spark://spark-master:7077
  SPARK_MODE: "worker"
  SPARK_WORKER_MEMORY: "3g"
  SPARK_WORKER_CORES: 2
  SPARK_DAEMON_JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20 -Dspark.worker.cleanup.enabled=true"

x-spark-worker-common:
  &spark-worker-common
  profiles: ["all", "spark"]
  build:
    context: ./docker/spark
    dockerfile: Dockerfile
  volumes:
    - ./docker/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
  networks:
    - airflow
  mem_reservation: "1.5G"
  mem_limit: "3G"
  cpus: "2"
  depends_on:
    - spark-master
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8081/"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 20s

services:
  af_postgres:
    image: postgres:17
    profiles: ["all","airflow"]
    container_name: af_postgres
    hostname: af_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - af-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    mem_reservation: "512M"
    mem_limit: "2G"
    cpus: 1
    networks:
      - airflow
    # I/O limits for Airflow PostgreSQL
    blkio_config:
      weight: 600
      device_write_bps:
        - path: /dev/vda
          rate: 30mb
      device_read_bps:
        - path: /dev/vda
          rate: 40mb

  af_redis:
    image: redis:7.2-bookworm
    profiles: ["all","airflow"]
    container_name: af_redis
    hostname: af_redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    mem_reservation: "256M"
    mem_limit: "512M"
    cpus: 0.5
    networks:
      - airflow

  af_webserver:
    profiles: ["all","airflow"]
    container_name: af_webserver
    hostname: af_webserver
    <<: *airflow-common
    command: webserver
    # ports:
    #   - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_reservation: "1G"
    mem_limit: "2G"
    cpus: 1
    # depends_on:
    #   <<: *airflow-common-depends-on
    #   af_init:
    #     condition: service_completed_successfully

  af_scheduler:
    profiles: ["all","airflow"]
    container_name: af_scheduler
    hostname: af_scheduler
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_reservation: "1.5G"
    mem_limit: "3G"
    cpus: 3
    # depends_on:
    #   <<: *airflow-common-depends-on
    #   af_init:
    #     condition: service_completed_successfully

  af_worker_0:
    profiles: ["all","airflow"]
    container_name: af_worker_0
    hostname: af_worker_0
    <<: *airflow-common
    command: celery worker -q spark_pool,default
    healthcheck:
      # yamllint disable rule:line-length
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    mem_reservation: "4G"
    mem_limit: "8G"
    cpus: 8
    # I/O limits for heavy Airflow worker (Spark jobs)
    blkio_config:
      weight: 700
      device_write_bps:
        - path: /dev/vda
          rate: 40mb
      device_read_bps:
        - path: /dev/vda
          rate: 50mb
    # depends_on:
    #   <<: *airflow-common-depends-on
      # af_init:
      #   condition: service_completed_successfully

  af_worker_1:
    profiles: ["all","airflow"]
    container_name: af_worker_1
    hostname: af_worker_1
    <<: *airflow-common
    command: celery worker -q default
    healthcheck:
      # yamllint disable rule:line-length
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    mem_reservation: "2G"
    mem_limit: "4G"
    cpus: 4
    # I/O limits for regular Airflow worker
    blkio_config:
      weight: 500
      device_write_bps:
        - path: /dev/vda
          rate: 25mb
      device_read_bps:
        - path: /dev/vda
          rate: 30mb
    # depends_on:
    #   <<: *airflow-common-depends-on
    #   af_init:
    #     condition: service_completed_successfully

  af_triggerer:
    profiles: ["all","airflow"]
    container_name: af_triggerer
    hostname: af_triggerer
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_reservation: "256M"
    mem_limit: "2G"
    cpus: 1
    # depends_on:
