  spark_worker_a:
    <<: *spark-worker-common
    container_name: spark_worker_a
    hostname: spark_worker_a
    environment:
      <<: *spark-worker-common-env
      SPARK_WORKER_WEBUI_PORT: 9091
    ports:
      - 9091:9091

  spark_worker_b:
    <<: *spark-worker-common
    container_name: spark_worker_b
    hostname: spark_worker_b
    environment:
      <<: *spark-worker-common-env
      SPARK_WORKER_WEBUI_PORT: 9092
    ports:
      - 9092:9092

  spark_worker_c:
    <<: *spark-worker-common
    container_name: spark_worker_c
    hostname: spark_worker_c
    environment:
      <<: *spark-worker-common-env
      SPARK_WORKER_WEBUI_PORT: 9093
    ports:
      - 9093:9093

  spark_worker_d:
    <<: *spark-worker-common
    container_name: spark_worker_d
    hostname: spark_worker_d
    environment:
      <<: *spark-worker-common-env
      SPARK_WORKER_WEBUI_PORT: 9094
    ports:
      - 9094:9094

  jupyter:
    profiles: ["all"]
    container_name: jupyter
    hostname: jupyter
    build:
      context: ./docker/jupyter
      dockerfile: Dockerfile
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token="" --NotebookApp.password=""
    ports:
      - "4040:4040"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_DRIVER_HOST=0.0.0.0
      - SPARK_DRIVER_BIND_ADDRESS=0.0.0.0
      - SPARK_PUBLIC_DNS=spark.rzvde.pro
      - SPARK_UI_PORT=4040
    volumes:
      - ./workspace/notebooks:/notebooks
      - ./workspace/jupyter_home:/home/jupyter_user  # Persist jupyter config
    working_dir: /notebooks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - airflow
    mem_reservation: "768M"
    mem_limit: "1.5G"
    cpus: "1"
    depends_on:
      - spark-master
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # https://github.com/guywiththecrack/jira-crack # use only for testing purposes, buy license later!
  confluence:
    build:
      context: ./docker/atlassian
      dockerfile: Dockerfile.confluence
    profiles: ["all"]
    container_name: confluence
    hostname: confluence
    restart: unless-stopped
    networks:
      - airflow
    volumes:
      - confluence-data:/var/atlassian/confluence
    ports:
    #   - '82:8090'
      - '8091:8091'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://confluence:8090/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - 'CATALINA_OPTS= -Xms512m -Xmx1536m -XX:+UseG1GC'
      - 'CONFLUENCE_PROXY_NAME='
      - 'CONFLUENCE_PROXY_PORT='
      - 'CONFLUENCE_PROXY_SCHEME='
      - 'CONFLUENCE_DELAYED_START='
    mem_reservation: "768M"
    mem_limit: "4G"
    cpus: "2"
    depends_on:
      - conf-postgresql
  conf-postgresql:
    image: postgres:9.5-alpine
    profiles: ["all"]
    container_name: conf-postgresql
    hostname: conf-postgresql
    networks:
      - airflow
    ports:
      - "5434:5432"
    volumes:
      - cf-postgresql-data:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_USER=confluencedb'
      - 'POSTGRES_PASSWORD=jellyfish'
      - 'POSTGRES_DB=confluencedb'
      - 'POSTGRES_ENCODING=UTF8'
      - 'POSTGRES_COLLATE=C'
      - 'POSTGRES_COLLATE_TYPE=C'
    mem_reservation: "512M"
    mem_limit: "1G"
    cpus: "0.5"
    # I/O limits for Confluence PostgreSQL
    blkio_config:
      weight: 400
      device_write_bps:
        - path: /dev/vda
          rate: 10mb
      device_read_bps:
        - path: /dev/vda
          rate: 15mb

  jira:
    depends_on:
      - jira-postgresql
    profiles: ["all"]
    container_name: jira
    hostname: jira
    restart: unless-stopped
    build:
      context: ./docker/atlassian
      dockerfile: Dockerfile.jira
    networks:
      - airflow
    volumes:
      - jira-data:/var/atlassian/jira
    # ports:
    #   - '81:8080'
    environment:
      - 'JIRA_DATABASE_URL=postgresql://jira@jira-postgresql/jiradb'
      - 'JIRA_DB_PASSWORD=jellyfish'
      - 'SETENV_JVM_MINIMUM_MEMORY=1536m'
      - 'SETENV_JVM_MAXIMUM_MEMORY=2560m'
      - 'JIRA_PROXY_NAME='
      - 'JIRA_PROXY_PORT='
      - 'JIRA_PROXY_SCHEME='
      # admin
      # password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://jira:8080/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_reservation: "1.5G"
    mem_limit: "4G"
    cpus: "2"
    logging:
      # limit logs retained on host to 25MB
      driver: "json-file"
      options:
        max-size: "500k"
        max-file: "50"

  jira-postgresql:
    image: postgres:9.5-alpine
    profiles: ["all"]
    container_name: jira-postgresql
    hostname: jira-postgresql
    networks:
      - airflow
    ports:
      - "5435:5432"
    volumes:
      - jr-postgresql-data:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_USER=jira'
      - 'POSTGRES_PASSWORD=jellyfish'
      - 'POSTGRES_DB=jiradb'
      - 'POSTGRES_ENCODING=UNICODE'
      - 'POSTGRES_COLLATE=C'
      - 'POSTGRES_COLLATE_TYPE=C'
    mem_reservation: "512M"
    mem_limit: "1G"
    cpus: "0.5"
    # I/O limits for Jira PostgreSQL
    blkio_config:
      weight: 400
      device_write_bps:
        - path: /dev/vda
          rate: 10mb
      device_read_bps:
        - path: /dev/vda
          rate: 15mb
    logging:
      # limit logs retained on host to 25MB
      driver: "json-file"
      options:
        max-size: "500k"
        max-file: "50"

  nginx:
    image: nginx:alpine
    profiles: ["all"]
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/certbot/conf:/etc/letsencrypt:ro
      - ./docker/nginx/certbot/www:/var/www/certbot:ro
    networks:
      - airflow
    depends_on:
      - af_webserver
      - superset
      - jupyter
      - af_flower
      - spark-master
      - spark_worker_a
      - spark_worker_b
      - spark_worker_c
      - spark_worker_d
      - monitoring
      - gpskew
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "5"

  monitoring:
    image: amir20/dozzle:v8.13
    profiles: ["all"]
    container_name: monitoring
    hostname: monitoring
    environment:
      - 'DOZZLE_ENABLE_ACTIONS=true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - airflow
    ports:
      - 8880:8080
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 3s
      timeout: 30s
      retries: 5
      start_period: 30s

  jupyterhub:
    profiles: ["all"]
    container_name: jupyterhub
    hostname: jupyterhub
    build:
      context: ./docker/jupyterhub
      dockerfile: Dockerfile
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_DRIVER_HOST=0.0.0.0
      - SPARK_DRIVER_BIND_ADDRESS=0.0.0.0
      - SPARK_PUBLIC_DNS=spark.rzvde.pro
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ./workspace/notebooks:/srv/workspace/notebooks:rw
      - ./docker/jupyterhub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
    working_dir: /srv/jupyterhub
    command: ["jupyterhub", "-f", "/srv/jupyterhub/jupyterhub_config.py"]
    networks:
      - airflow
    mem_reservation: "512M"
    mem_limit: "1G"
    cpus: "1"

  gpskew:
    build:
      context: ../distribution-partitioning-demo-webapp
      dockerfile: Dockerfile
    profiles: ["all"]
    container_name: gpskew
    restart: unless-stopped
    networks:
      - airflow
    mem_reservation: "128M"
    mem_limit: "512M"
    cpus: "0.5"

  certbot:
    image: certbot/certbot
    profiles: ["all"]
    container_name: certbot
    volumes:
      - ./docker/nginx/certbot/conf:/etc/letsencrypt
      - ./docker/nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # dbt-docs:
  #   image: node:18-alpine
  #   profiles: ["all"]
  #   container_name: dbt_docs
  #   working_dir: /app
  #   command: |
  #     sh -c "
  #     npm install -g http-server &&
  #     echo 'DBT docs will be served here when ready' > index.html &&
  #     http-server -p 8000 --cors
  #     "
  # networks:
  #   - airflow
  #   mem_reservation: "64M"
  #   mem_limit: "256M"
  #   cpus: "0.25"

volumes:
  gpdb-data:
    external: true
  af-pg-data:
    external: true
  clickhouse01-data:
    external: true
  clickhouse02-data:
    external: true
  clickhouse03-data:
    external: true
  clickhouse04-data:
    external: true
  cf-postgresql-data:
    external: true
  confluence-data:
    external: true
  jr-postgresql-data:
    external: true
  jira-data:
    external: true
  gpdb4seg-data:
    external: true

networks:
  airflow:
    driver: bridge
    attachable: true
