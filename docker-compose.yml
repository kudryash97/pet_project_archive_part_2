  af_flower:
    profiles: ["all","airflow"]
    container_name: af_flower
    <<: *airflow-common
    command: celery flower
    # ports:
    #   - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_reservation: "128M"
    mem_limit: "256M"
    cpus: 0.5
    # depends_on:
    #   <<: *airflow-common-depends-on
    #   af_init:
    #     condition: service_completed_successfully

  greenplum4seg:
    profiles: ["all"]
    build:
      context: docker/greenplum4seg
      dockerfile: Dockerfile
      args:
        SEGMENT_COUNT: 4
    container_name: greenplum4seg
    hostname: greenplum4seg
    platform: linux/amd64
    ports:
      - "5433:5432"
      - "5888:5888"
    environment:
      GP_USER: gpadmin
      GP_DATABASE: postgres
      PXF_JVM_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - gpdb4seg-data:/data
      - ./docker/greenplum4seg/pxf/conf:/data/pxf/conf
      - ./docker/greenplum4seg/pxf/servers:/data/pxf/servers
    deploy:
      resources:
        limits:
          cpus: '10'
          memory: 20G
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/gpdb/bin/pg_isready -h localhost -p 5432 -U gpadmin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  greenplum:
    profiles: ["all"]
    build:
      context: docker/greenplum
      dockerfile: Dockerfile
    container_name: greenplum
    hostname: greenplum
    platform: linux/amd64
    ports:
      - "5430:5432"
      - "5889:5888"
    environment:
      GP_USER: gpadmin
      GP_DATABASE: postgres
      PXF_JVM_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - gpdb-data:/data
      - ./docker/greenplum/pxf/conf:/data/pxf/conf
      - ./docker/greenplum/pxf/servers:/data/pxf/servers
    deploy:
      resources:
        limits:
          cpus: '10'
          memory: 20G
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/gpdb/bin/pg_isready -h localhost -p 5432 -U gpadmin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # I/O limits for Greenplum (highest priority database)
    blkio_config:
      weight: 900
      device_write_bps:
        - path: /dev/vda
          rate: 100mb
      device_read_bps:
        - path: /dev/vda
          rate: 150mb

  zookeeper:
    image: zookeeper:3.7
    profiles: ["all"]
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - airflow
    volumes:
      - ./docker/zookeeper/config/zoo.cfg:/conf/zoo.cfg:ro
    environment:
      ZOO_CONF_DIR: /conf
      ZOO_AUTOPURGE_PURGEINTERVAL: 1
      ZOO_AUTOPURGE_SNAPRETAINCOUNT: 3
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_reservation: "256M"
    mem_limit: "512M"
    cpus: "0.5"
    # I/O limits optimized for 372GB non-replicated SSD (328MB/s write, 440MB/s read)
    blkio_config:
      weight: 600
      device_write_bps:
        - path: /dev/vda
          rate: 25mb
      device_read_bps:
        - path: /dev/vda
          rate: 30mb

  clickhouse01:
    <<: *clickhouse-common
    profiles: ["all"]
    container_name: clickhouse01
    hostname: clickhouse01
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./docker/clickhouse/clickhouse01:/etc/clickhouse-server
      - clickhouse01-data:/var/lib/clickhouse

  clickhouse02:
    <<: *clickhouse-common
    profiles: ["all"]
    container_name: clickhouse02
    hostname: clickhouse02
    ports:
      - "8124:8123"
    volumes:
      - ./docker/clickhouse/clickhouse02:/etc/clickhouse-server
      - clickhouse02-data:/var/lib/clickhouse

  clickhouse03:
    <<: *clickhouse-common
    profiles: ["all"]
    container_name: clickhouse03
    hostname: clickhouse03
    ports:
      - "8125:8123"
    volumes:
      - ./docker/clickhouse/clickhouse03:/etc/clickhouse-server
      - clickhouse03-data:/var/lib/clickhouse

  clickhouse04:
    <<: *clickhouse-common
    profiles: ["all"]
    container_name: clickhouse04
    hostname: clickhouse04
    ports:
      - "8126:8123"
    volumes:
      - ./docker/clickhouse/clickhouse04:/etc/clickhouse-server
      - clickhouse04-data:/var/lib/clickhouse

  superset_redis:
    image: redis:7.2-bookworm
    profiles: ["all"]
    container_name: superset_redis
    hostname: superset_redis
    networks:
      - airflow
    mem_reservation: "64M"
    mem_limit: "128M"
    cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  superset:
    build:
      context: ./docker/bi-superset
      dockerfile: Dockerfile
    profiles: ["all"]
    container_name: superset
    hostname: superset
    networks:
      - airflow
    # ports:
    #   - "9999:8088"
    environment:
      - SUPERSET_SECRET_KEY=your_secret_key_here
      - DATABASE_DIALECT=postgresql
      - DATABASE_USER=airflow
      - DATABASE_PASSWORD=${_AIRFLOW_WWW_USER_PASSWORD}
      - DATABASE_HOST=af_postgres
      - DATABASE_PORT=5432
      - DATABASE_DB=airflow
      - REDIS_HOST=superset_redis
      - REDIS_PORT=6379
      - SQLALCHEMY_DATABASE_URI='postgresql://airflow:${_AIRFLOW_WWW_USER_PASSWORD}@af_postgres:5432/airflow?options=-csearch_path%3Dsuperset'
    volumes:
      - ./docker/bi-superset/superset_config.py:/app/pythonpath/superset_config.py
    depends_on:
      af_postgres:
        condition: service_healthy
      superset_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_reservation: "512M"
    mem_limit: "1G"
    cpus: "1"
    command:
      - bash
      - -c
      - |
        PGPASSWORD=${_AIRFLOW_WWW_USER_PASSWORD} psql -h af_postgres -U airflow -d airflow -c 'CREATE SCHEMA IF NOT EXISTS superset;' &&
        
        # Clean up and recreate admin user
        superset shell << 'EOF'
        from superset import db
        from flask_appbuilder.security.sqla.models import User
        admin_user = db.session.query(User).filter_by(username='admin').first()
        if admin_user:
            db.session.delete(admin_user)
            db.session.commit()
            print("Existing admin user deleted")
        exit()
        EOF
        
        superset fab create-admin \
                --username admin \
                --firstname Superset \
                --lastname Admin \
                --email admin@localhost \
                --password admin
        superset db upgrade
        superset init
        superset run -h 0.0.0.0 -p 8088 --with-threads --reload --debugger

  spark-master:
    profiles: ["all", "spark"]
    container_name: spark-master
    hostname: spark-master
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    environment:
      SPARK_MASTER_WEBUI_PORT: 9090
      SPARK_PUBLIC_DNS: "spark.rzvde.pro"
      SPARK_MODE: "master"
      SPARK_DAEMON_MEMORY: "2g"
      SPARK_DAEMON_JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20"
      SPARK_EXECUTOR_MEMORY: "2g"
      SPARK_DRIVER_MEMORY: "4g"
      SPARK_EXECUTOR_CORES: 1
      SPARK_DEFAULT_PARALLELISM: 4
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    ports:
      - 9090:9090
    #   - 7077:7077
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9090" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - airflow
    mem_reservation: "2G"
    mem_limit: "4G"
    cpus: "2"

  # spark-connect:
